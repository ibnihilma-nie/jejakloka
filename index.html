<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Jejak Loka - App</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+Javanese&family=Noto+Sans+Balinese&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8B5A2B;
      --secondary: #D4A373;
      --accent: #6B8E6B;
      --bg-light: #FDF8F0;
      --surface: #FFFFFF;
      --text-dark: #3E2723;
      --text-light: #8D6E63;
      --nav-bg: rgba(255, 255, 255, 0.9);
      --shadow: 0 10px 25px -5px rgba(139, 90, 43, 0.15);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #E7DCC8;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text-dark);
    }

    /* Mobile Frame */
    .app-frame {
      width: 100%;
      max-width: 414px;
      height: 100vh;
      max-height: 896px;
      background: var(--bg-light);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 50px 100px -20px rgba(0,0,0,0.3);
    }

    @media (min-width: 415px) {
      .app-frame {
        border-radius: 40px;
        height: 85vh;
        border: 10px solid #222;
      }
    }

    /* Status Bar Simulation */
    .status-bar {
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 700;
      background: var(--bg-light);
      z-index: 100;
    }

    /* Header Navigation */
    header {
      padding: 10px 24px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-light);
      z-index: 90;
    }

    .brand h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .xp-badge {
      background: white;
      padding: 8px 14px;
      border-radius: 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      border: 1px solid rgba(139, 90, 43, 0.1);
    }

    /* Scrollable Content */
    .view-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 120px; /* Space for nav */
      scrollbar-width: none;
      scroll-behavior: smooth;
    }
    .view-container::-webkit-scrollbar { display: none; }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: transform 0.2s;
    }

    .card:active { transform: scale(0.98); }

    /* Adventure Page */
    .map-scroller {
      display: flex;
      gap: 15px;
      overflow-x: auto;
      padding: 10px 0;
      scrollbar-width: none;
    }
    .map-scroller::-webkit-scrollbar { display: none; }

    .island-node {
      min-width: 140px;
      height: 180px;
      background: white;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: var(--shadow);
      position: relative;
    }

    .island-node.locked { opacity: 0.6; filter: grayscale(1); }
    .island-node.locked::after { content: "🔒"; position: absolute; top: 10px; right: 10px; font-size: 0.8rem; }
    .island-node .icon { font-size: 3rem; }

    /* Daily Page */
    .hero-banner {
      background: linear-gradient(145deg, #8B5A2B, #5D3A1A);
      color: white;
      border-radius: 30px;
      padding: 30px 20px;
      text-align: center;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .hero-banner::before {
      content: "ꦤꦸꦱꦤ꧀ꦠꦫ";
      position: absolute;
      font-size: 6rem;
      opacity: 0.05;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Noto Sans Javanese';
    }

    /* Keyboard UI */
    .keyboard-preview {
      background: #F5EFE6;
      border-radius: 20px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-family: 'Noto Sans Javanese';
      margin: 15px 0;
      padding: 20px;
      text-align: center;
      color: var(--primary);
    }

    textarea {
      width: 100%;
      border: 2px solid #EEDCC8;
      border-radius: 15px;
      padding: 15px;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      background: white;
    }

    /* Bottom Navigation App Bar */
    .tab-bar {
      position: absolute;
      bottom: 25px;
      left: 20px;
      right: 20px;
      height: 75px;
      background: var(--nav-bg);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.4);
      z-index: 1000;
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--secondary);
      font-size: 0.65rem;
      font-weight: 700;
      gap: 4px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .tab-item span { font-size: 1.6rem; transition: transform 0.3s; }
    .tab-item.active { color: var(--primary); }
    .tab-item.active span { transform: translateY(-8px) scale(1.2); }

    /* Button */
    .btn-main {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 18px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 20px -6px var(--primary);
    }

    /* Animations */
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Progress */
    .progress-track {
      width: 100%;
      height: 8px;
      background: #EEDCC8;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      transition: width 0.6s ease;
    }
  </style>
</head>
<body>

<div class="app-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:41</span>
    <div style="display:flex; gap:6px;">
      <span>📶</span><span>🔋</span>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="brand">
      <h1>Jejak Loka</h1>
    </div>
    <div class="xp-badge">
      <span>⭐</span> <span id="xpDisplay">120</span>
    </div>
  </header>

  <!-- Content Container -->
  <main class="view-container" id="mainView">
    <!-- Konten halaman dimuat di sini -->
  </main>

  <!-- Bottom Navigation Tab Bar -->
  <nav class="tab-bar">
    <div class="tab-item active" onclick="switchTab('adventure', this)">
      <span>🌏</span>Petualangan
    </div>
    <div class="tab-item" onclick="switchTab('daily', this)">
      <span>📖</span>Harian
    </div>
    <div class="tab-item" onclick="switchTab('aksara', this)">
      <span>⌨️</span>Aksara
    </div>
    <div class="tab-item" onclick="switchTab('profile', this)">
      <span>👤</span>Profil
    </div>
  </nav>
</div>

<script>
  // -- App State --
  let userXP = 120;
  let currentTab = 'adventure';

  // -- Page Content Templates --
  const pages = {
    adventure: `
      <div class="fade-in">
        <h2 style="margin-bottom:15px; font-size:1.2rem;">Lanjutkan Perjalanan</h2>
        <div class="map-scroller">
          <div class="island-node" onclick="alert('Membuka Sumatra...')">
            <span class="icon">🏝️</span>
            <b style="font-size:0.9rem">Sumatra</b>
            <span style="font-size:0.7rem; color:var(--accent); font-weight:700">75% Selesai</span>
          </div>
          <div class="island-node locked">
            <span class="icon">🌋</span>
            <b style="font-size:0.9rem">Jawa</b>
            <span style="font-size:0.7rem">Level 5 Butuh</span>
          </div>
          <div class="island-node locked">
            <span class="icon">🌊</span>
            <b style="font-size:0.9rem">Bali</b>
          </div>
        </div>

        <div class="card" style="margin-top:25px;">
          <h3>Misi Harian</h3>
          <p style="font-size:0.85rem; color:var(--text-light); margin:8px 0">Pelajari 3 kata baru tentang alam hari ini.</p>
          <div class="progress-track">
            <div class="progress-bar" style="width: 33%"></div>
          </div>
          <div style="display:flex; justify-content:space-between; font-size:0.75rem; font-weight:700;">
            <span>Progres: 1/3</span>
            <span style="color:var(--primary)">+50 XP</span>
          </div>
        </div>
      </div>
    `,
    daily: `
      <div class="fade-in">
        <div class="hero-banner">
          <p style="font-size:0.7rem; letter-spacing:2px; font-weight:700;">KATA HARI INI</p>
          <div style="font-size:3.5rem; margin:15px 0; font-family:'Noto Sans Javanese'">ꦧꦸꦩꦶ</div>
          <h2 style="font-size:1.8rem">Bumi</h2>
          <p style="margin-top:8px; opacity:0.8">Tanah air tempat berpijak</p>
        </div>
        
        <div class="card">
          <p style="line-height:1.6; color:var(--text-light); font-style:italic">"Aksara adalah cermin jiwa suatu bangsa. Mempelajarinya berarti menghargai bumi tempat kita berdiri."</p>
          <button class="btn-main" style="margin-top:20px" onclick="gainXP(20)">
            Bagikan ke Cerita (+20 XP)
          </button>
        </div>
      </div>
    `,
    aksara: `
      <div class="fade-in">
        <div class="card">
          <h3 style="margin-bottom:15px">Generator Aksara</h3>
          <textarea id="latinInput" placeholder="Ketik latin... (contoh: halo)" oninput="convertText()"></textarea>
          <div class="keyboard-preview" id="aksaraOut">...</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
            <button class="btn-main" style="background:#fff; color:var(--primary); border:1px solid #EEDCC8" onclick="copyAksara()">Salin</button>
            <button class="btn-main" onclick="gainXP(5)">Simpan</button>
          </div>
        </div>
      </div>
    `,
    profile: `
      <div class="fade-in" style="text-align:center">
        <div style="width:100px; height:100px; background:var(--secondary); border-radius:50%; margin:0 auto 15px; border:4px solid white; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center; font-size:3rem">🧑🎨</div>
        <h2>Satriya Aksara</h2>
        <p style="color:var(--text-light); font-size:0.85rem">Level 3 • Pengembara</p>
        
        <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin:25px 0">
          <div class="card" style="padding:15px 10px; margin:0">
            <b style="font-size:1.1rem; color:var(--primary)">12</b>
            <p style="font-size:0.6rem; font-weight:700">BADGE</p>
          </div>
          <div class="card" style="padding:15px 10px; margin:0">
            <b style="font-size:1.1rem; color:var(--primary)">5</b>
            <p style="font-size:0.6rem; font-weight:700">STREAK</p>
          </div>
          <div class="card" style="padding:15px 10px; margin:0">
            <b style="font-size:1.1rem; color:var(--primary)">1.2k</b>
            <p style="font-size:0.6rem; font-weight:700">TOTAL XP</p>
          </div>
        </div>

        <div class="card" style="text-align:left">
          <h3 style="font-size:0.9rem">Pencapaian Baru</h3>
          <div style="display:flex; gap:10px; margin-top:10px">
            <span title="Penjaga Budaya">🎖️</span>
            <span title="Pembelajar Cepat">🚀</span>
            <span title="Pecinta Sejarah">📜</span>
          </div>
        </div>
      </div>
    `
  };

  // -- Functions --
  function switchTab(tab, el) {
    currentTab = tab;
    // Update Nav UI
    document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    
    // Render View
    document.getElementById('mainView').innerHTML = pages[tab];
    
    // Smooth scroll to top
    document.querySelector('.view-container').scrollTop = 0;
  }

  function convertText() {
    const input = document.getElementById('latinInput').value.toLowerCase();
    const map = {'a':'ꦲ','b':'ꦧ','c':'ꦕ','d':'ꦢ','e':'ꦌ','g':'ꦒ','h':'ꦲ','i':'ꦆ','j':'ꦗ','k':'ꦏ','l':'ꦭ','m':'ꦩ','n':'ꦤ','o':'ꦎ','p':'ꦥ','r':'ꦫ','s':'ꦱ','t':'ꦠ','u':'ꦈ','w':'ꦮ','y':'ꦪ'};
    let result = "";
    for(let c of input) result += map[c] || c;
    document.getElementById('aksaraOut').innerText = result || "...";
  }

  function gainXP(amount) {
    userXP += amount;
    document.getElementById('xpDisplay').innerText = userXP;
    
    // Toast Notification
    const toast = document.createElement('div');
    toast.innerHTML = `<b>+${amount} XP</b> Berhasil didapatkan! ✨`;
    toast.style = `position:fixed; top:80px; left:50%; transform:translateX(-50%); background:var(--text-dark); color:white; padding:10px 20px; border-radius:30px; font-size:0.8rem; z-index:2000; box-shadow:0 10px 20px rgba(0,0,0,0.2); animation: toastAnim 2s forwards;`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  function copyAksara() {
    const text = document.getElementById('aksaraOut').innerText;
    navigator.clipboard.writeText(text);
    gainXP(10);
  }

  // Initialize
  window.onload = () => switchTab('adventure', document.querySelector('.tab-item'));

</script>

<style>
  @keyframes toastAnim {
    0% { opacity:0; transform:translateX(-50%) translateY(20px); }
    15% { opacity:1; transform:translateX(-50%) translateY(0); }
    85% { opacity:1; transform:translateX(-50%) translateY(0); }
    100% { opacity:0; transform:translateX(-50%) translateY(-20px); }
  }
</style>

</body>
</html>
